<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond carré arrondi navy ChantierPro -->
  <rect width="512" height="512" rx="112" ry="112" fill="#1B3A5C"/>
  <!-- Lettres CP centrées : C blanc, P orange. Font weight 900 pour la
       robustesse cross-renderer (browsers, sharp/librsvg) — fallback
       sans-serif si la fonte préférée n'est pas dispo côté build. -->
  <text x="256" y="358"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="280"
        letter-spacing="-12"
        text-anchor="middle">
    <tspan fill="#FFFFFF">C</tspan><tspan fill="#FF6B2C">P</tspan>
  </text>
</svg>
