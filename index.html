<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>ChantierPro</title>
    <meta name="description" content="Gestion de chantiers BTP : devis, planning, équipe, terrain, comptabilité." />
    <!-- PWA : manifest + thème -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1B3A5C" />
    <!-- iOS Safari (PWA depuis Add to Home Screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ChantierPro" />
    <!-- Favicon + apple-touch-icon : logo ChantierPro (PNG opaque, iOS applique
         lui-même les coins arrondis). Fallback SVG conservé en dernier pour
         compat anciens navigateurs si le PNG n'est pas encore déployé. -->
    <link rel="icon" type="image/png" sizes="32x32" href="/logo_chantier_pro.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo_chantier_pro.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo_chantier_pro.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/logo_chantier_pro.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <!-- Web fonts via Google Fonts CDN. Plus Jakarta Sans = font principale
         (déjà chargée par App.jsx via @import). Inter = utilisée pour l'option
         "Moderne (Inter)" du sélecteur de modèle de devis. preconnect réduit
         la latence du 1er fetch ; display=swap évite le FOIT. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* Safe-area iOS (notch / Dynamic Island / home indicator).
         Couplé à viewport-fit=cover dans la balise meta viewport ci-dessus.
         Ces variables valent 0 hors iOS — aucun impact desktop ni Android.
         Utilisables via env() direct ou via les vars --safe-* dans tout le code
         React (inline styles via calc(env(safe-area-inset-top) + 14px) ou
         var(--safe-top) pour les classes définies plus bas). */
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
      }
      /* Désactive le pull-to-refresh natif iOS / Android : tirer vers le bas
         ne rafraîchit plus la page (perte de state React + données non
         persistées). Appliqué dès le 1er paint via index.html, donc actif
         aussi sur l'écran de loading et l'onboarding (avant que les styles
         injectés par App.jsx ne soient montés).
         overscroll-behavior-y: contain → empêche la propagation du scroll
         au browser (et donc le pull-to-refresh) sans casser le scroll interne. */
      html, body {
        overscroll-behavior-y: contain;
        -webkit-overscroll-behavior-y: contain;
        /* touch-action limite les gestes interprétés par le browser sur le
           body — pan-x pan-y autorise le scroll horizontal/vertical mais
           bloque pinch-zoom et certains gestes système qui déclenchaient
           le pull-to-refresh sur iOS Safari. */
        touch-action: pan-x pan-y;
      }
      body {
        /* Padding safe-area sur body pour les bords gauche/droite (paysage
           iPhone) et bas (home indicator). Le top n'est PAS appliqué ici car
           les éléments fixed top:0 doivent l'absorber individuellement (sinon
           on aurait une bande vide en haut sur tout l'app). */
        padding-left: var(--safe-left);
        padding-right: var(--safe-right);
        padding-bottom: var(--safe-bottom);
        margin: 0;
      }
      /* Helpers pour les éléments fixed/sticky qui collent en haut de l'écran.
         Utiliser className="cp-safe-top" sur le bandeau impersonation, sidebar
         mobile, modales fullscreen mobile. */
      .cp-safe-top {
        padding-top: calc(var(--safe-top) + 0px);
      }
      .cp-safe-top-10 { padding-top: calc(var(--safe-top) + 10px); }
      .cp-safe-bottom { padding-bottom: calc(var(--safe-bottom) + 0px); }
      /* Pour les boutons flottants en bas droite : décaler de la safe-bottom */
      .cp-fab-safe-bottom { bottom: calc(14px + var(--safe-bottom)) !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
